<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Cliente - Gameland Events</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Cliente.css">
</head>
<body>
    <div class="main-wrapper">
        <header class="top-left-logo">
            <img src="Gameland Logo.png" alt="Gameland Events" class="mini-logo">
        </header>

        <main class="content-wrapper">
            <form class="form-container" id="login-form" action="../Controller/UserController.php" method="post">
                <h2>LOGIN</h2>

                <input type="hidden" name="action" value="login">
                 
                <div class="input-field">
                    <label for="usuario">USUARIO:</label>
                    <input type="text" id="usuario" name="usuario" required placeholder="XXXXXXXX">
                </div>

                <div class="input-field">
                    <label for="password">CONTRASEÑA:</label>
                    <input type="password" id="password" name="password" required placeholder="XXXXXXXX">
                </div>
            </form>

            <button type="submit" form="login-form" name="login" class="btn-entrar">ENTRAR</button>

            <div class="footer-link">
                <span>Aún no eres parte de la familia? </span>
                <a href="registro.html">regístrate aquí</a>
            </div>
        </main>

     
    </div>
</body>
</html>
