<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameland Events</title>
    <link rel="stylesheet" href="Main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Changa:wght@400;700&family=Oxanium:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <header class="main-header">
        <div class="header-container container">
            <div class="logo">
                <img src="Imagenes/Gameland Logo.png" alt="Gameland Events Logo">

            </div>
            <div class="search-bar">
                <input type="search" placeholder="BUSCADOR...">
            </div>
        </div>
    </header>

    <main class="main-content container">

        <section class="hero-slider">
            <div class="decorations-left">
            </div>

            <div class="slider-banner">
                <div class="banner-content">
                    <img src="Imagenes/GAMEAWARD.jpg" alt="Game Awards Logo" >
                </div>

                <a href="Eventos.html" class="btn-featured">Ver Todos los eventos Destacados</a>

                <button class="slider-arrow prev">&#10094;</button> <button class="slider-arrow next">&#10095;</button>
            </div>

            <div class="decorations-right">
            </div>
        </section>

        <section class="platform-categories">
            <a href="https://www.xbox.com/en-US/" class="category-item">
                <div class="platform-icon" id="xbox">
                    <img src="Imagenes/XboxLogo.png" alt="Xbox Logo">
                </div>
                <button class="btn-category">Xbox<br>GAMES</button>
            </a>

            <a href="https://www.playstation.com/en-us/" class="category-item">
                <div class="platform-icon" id="psn">
                    <img src="Imagenes/PsnLogo.png" alt="PSN Logo">
                </div>
                <button class="btn-category">PSN<br>GAMES</button>
            </a>

            <a href="https://www.nintendo.com/es-es/" class="category-item">
                <div class="platform-icon" id="nintendo">
                    <img src="Imagenes/NintendoLogo.png" alt="Nintendo Logo">
                </div>
                <button class="btn-category">Nintendo<br>GAMES</button>
            </a>

            <a href="https://apps.microsoft.com/games?hl=es-ES&gl=ES" class="category-item">
                <div class="platform-icon" id="pc">
                    <img src="Imagenes/MicrosoftLogo.png" alt="PC Logo">
                </div>
                <button class="btn-category">PC<br>GAMES</button>
            </a>
        </section>
    </main>

    <footer class="main-footer">
    <div class="footer-container container">
        <nav aria-label="Mapa del sitio">
            <ul style="list-style:none; display:flex; gap:20px; justify-content: flex-end;">
                <li><a href="Main.html" style="color:white;">Inicio</a></li>
                <li><a href="Eventos.html" style="color:white;">Eventos</a></li>
                <li><a href="Perfil.html" style="color:white;">Perfil</a></li>
                <li style="color: white">Cerrar Sesion</li>
            </ul>
        </nav>
        <div class="social-links" style="margin-top:10px;">
            <a href="#" class="social-icon x-icon" aria-label="X">X</a>
            <a href="#" class="social-icon instagram-icon" aria-label="Instagram">IG</a>
            <a href="#" class="social-icon facebook-icon" aria-label="Facebook">FB</a>
        </div>
    </div>
</footer>

</body>

</html>
