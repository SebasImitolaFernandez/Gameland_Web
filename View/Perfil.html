<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Gameland Events</title>
    <link rel="stylesheet" href="Registro.css">
</head>
<body>
    <header class="top-left-logo">
        <img src="Imagenes/Gameland Logo.png" alt="Gameland Events" class="mini-logo">
    </header>
    <main class="container-registro">
        <form class="form-card" action="#" method="post">
            <h2>MI PERFIL</h2>
            
            <div class="input-group">
                <label for="edit-user">NOMBRE DE USUARIO</label>
                <input type="text" id="edit-user" name="username" value="UsuarioActual">
            </div>

            <div class="input-group">
                <label for="edit-email">CORREO ELECTRÓNICO</label>
                <input type="email" id="edit-email" name="email" value="ejemplo@correo.com">
            </div>

            <div class="input-group">
                <label for="new-pass">NUEVA CONTRASEÑA</label>
                <input type="password" id="new-pass" name="password" placeholder="********">
            </div>

            <button type="submit" class="btn-role-label" style="width: 100%; border: none; cursor: pointer; margin-top: 15px;">GUARDAR CAMBIOS</button>
        </form>
    </main>
</body>
</html>
