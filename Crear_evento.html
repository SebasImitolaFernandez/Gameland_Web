<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameland Events - Crear Evento</title>
    <link rel="stylesheet" href="Crear_evento.css">
</head>
<body>

    <header class="navbar">
        <img src="Gameland Logo.png" alt="Gameland Events" class="logo">
        <div class="search-box">
            <input type="text" placeholder="BUSCADOR...">
        </div>
    </header>

    <main class="form-container">
        <div class="card-form">
            <h1>CREAR EVENTO</h1>

            <form>
                <div class="form-group">
                    <label>NOMBRE</label>
                    <input type="text" class="input-short">
                </div>

                <div class="form-group">
                    <label>DESCRIPCION</label>
                    <textarea rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label>IMAGENES</label>
                    <div class="image-upload-placeholder"></div>
                </div>

                <div class="form-group">
                    <label>PRECIO ENTRADAS</label>
                    <input type="text" class="input-medium">
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-edit">EDITAR</button>
                    <button type="submit" class="btn btn-save">GUARDAR</button>
                    <button type="button" class="btn btn-delete">ELIMINAR</button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
