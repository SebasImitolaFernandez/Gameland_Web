<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameland Events - Home</title>
    <link rel="stylesheet" href="Main.css">
</head>

<body>
    <div class="main-wrapper">
        <header class="top-bar">
            <div class="logo-side">
                <img src="Gameland Logo.png" alt="Logo" class="mini-logo">
            </div>
            
            <form class="search-container">
                <input type="search" placeholder="BUSCADOR..." required class="search-input">
            </form>
            
            <div class="spacer"></div> </header>

        <main class="main-content">
            <section class="featured-section">
                <div class="event-card">
                    <h2 class="event-title">EVENTOS DESTACADOS</h2>
                    
                    <div class="carousel-wrapper">
                        <button class="nav-arrow" type="button">&#9664;</button>
                        
                        <div class="goty-frame">
                            <img src="goty.jpg" alt="The Game Awards GOTY" class="goty-image">
                        </div>
                        
                        <button class="nav-arrow" type="button">&#9654;</button>
                    </div>

                    <div class="event-footer">
                        <a href="#" class="btn-view-all">Ver Todos los eventos Destacados</a>
                        <div class="dots-pagination">
                            <span class="dot active"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                            <span class="dot"></span>
                        </div>
                    </div>
                </div>
            </section>

            <section class="games-grid">
                <div class="games-scroll">
                    <div class="game-box"></div>
                    <div class="game-box"></div>
                    <div class="game-box"></div>
                    <div class="game-box"></div>
                    <div class="game-box"></div>
                    <div class="game-box"></div>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
